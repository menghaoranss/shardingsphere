# SPEX ADDED: BEGIN
dataSources:
  encrypt_ds:
    dataSourceClassName: org.apache.shardingsphere.test.fixture.jdbc.MockedDataSource

rules:
- !ENCRYPT
  tables:
    TEST1:
      columns:
        A:
          cipher:
            name: A_C
            encryptorName: aes_encryptor
          plain:
            name: A
        B:
          cipher:
            name: B_C
            encryptorName: aes_encryptor
          plain:
            name: B
        C:
          cipher:
            name: C_C
            encryptorName: aes_encryptor
          plain:
            name: C
        D:
          cipher:
            name: D_C
            encryptorName: aes_encryptor
          plain:
            name: D
    TEST2:
      columns:
        A:
          cipher:
            name: A_C
            encryptorName: aes_encryptor_2
          plain:
            name: A
        B:
          cipher:
            name: B_C
            encryptorName: aes_encryptor_2
          plain:
            name: B
        C:
          cipher:
            name: C_C
            encryptorName: aes_encryptor_2
          plain:
            name: C
        D:
          cipher:
            name: D_C
            encryptorName: aes_encryptor_2
          plain:
            name: D
  encryptMode:
    type: FRONTEND
    props:
      udf-sql-enabled: false
      udf-routine-enabled: true
      udf-view-enabled: false
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    aes_encryptor_2:
      type: AES
      props:
        aes-key-value: 333222abc
        digest-algorithm-name: SHA-1
    
props:
  schema-rewrite-enabled: true
# SPEX ADDED: END
