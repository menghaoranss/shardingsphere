# SPEX ADDED: BEGIN
databaseName: encrypt

dataSources:
  encrypt:
    url: jdbc:dm://dm.encrypt.host:5236?schema=encrypt
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !ENCRYPT
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    like_encryptor:
      type: SphereEx:CHAR_TRANSFORM_LIKE
      props:
        transform-indexes: 1,2,3,5,7,14
    char_digest_like_encryptor:
      type: CHAR_DIGEST_LIKE
  tables:
    T_USER:
      columns:
        USER_NAME:
          plainColumn: USER_NAME_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: USER_NAME_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: USER_NAME_LIKE
          likeQueryEncryptorName: like_encryptor
        PASSWORD:
          plainColumn: PASSWORD_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: PASSWORD_CIPHER
          encryptorName: aes_encryptor
        EMAIL:
          plainColumn: EMAIL_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: EMAIL_CIPHER
          encryptorName: aes_encryptor
        TELEPHONE:
          plainColumn: USER_TELEPHONE_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: USER_TELEPHONE_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: USER_TELEPHONE_LIKE
          likeQueryEncryptorName: like_encryptor
    T_MERCHANT:
      columns:
        BUSINESS_CODE:
          plainColumn: BUSINESS_CODE_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: BUSINESS_CODE_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: BUSINESS_CODE_LIKE
          likeQueryEncryptorName: like_encryptor
        TELEPHONE:
          plainColumn: MERCHANT_TELEPHONE_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: MERCHANT_TELEPHONE_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: MERCHANT_TELEPHONE_LIKE
          likeQueryEncryptorName: like_encryptor
    T_MERCHANT_DETAIL:
      columns:
        BUSINESS_CODE:
          plainColumn: BUSINESS_CODE_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: BUSINESS_CODE_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: BUSINESS_CODE_LIKE
          likeQueryEncryptorName: like_encryptor
        TELEPHONE:
          plainColumn: MERCHANT_TELEPHONE_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: MERCHANT_TELEPHONE_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: MERCHANT_TELEPHONE_LIKE
          likeQueryEncryptorName: like_encryptor
    SYS_USR_SYS_R:
      columns:
        RL_NAME:
          cipherColumn: RL_NAME_CIPHER
          encryptorName: aes_encryptor
          likeQueryColumn: RL_NAME_FOR_QRY
          likeQueryEncryptorName: char_digest_like_encryptor
        CERT_NO:
          cipherColumn: CERT_NO_CIPHER
          encryptorName: aes_encryptor
        REF_MP:
          cipherColumn: REF_MP_CIPHER
          encryptorName: aes_encryptor
    SYS_USR:
      columns:
        MP:
          cipherColumn: MP_CIPHER
          encryptorName: aes_encryptor
        E_MAIL:
          cipherColumn: E_MAIL_CIPHER
          encryptorName: aes_encryptor
    T_PRODUCT_EXTEND:
      columns:
        MANUAL:
          plainColumn: MANUAL_PLAIN
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: MANUAL_CIPHER
          encryptorName: aes_encryptor

props:
  sql-show: true


# SPEX ADDED: END
