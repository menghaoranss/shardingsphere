# SPEX ADDED: BEGIN
databaseName: sphereex_encrypt_failover

dataSources:
  sphereex_encrypt_failover:
    url: jdbc:dm://dm.sphereex_encrypt_failover.host:5236?schema=sphereex_encrypt_failover
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !SINGLE
  tables:
    - "*.*"
- !ENCRYPT
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    like_encryptor:
      type: SphereEx:CHAR_TRANSFORM_LIKE
      props:
        transform-indexes: 1,2,3,5,7,14
    char_digest_like_encryptor:
      type: CHAR_DIGEST_LIKE
  encryptMode:
    type: FRONTEND
    props:
      use-original-sql-when-cipher-query-failed: true
  tables:
    T_MERCHANT:
      columns:
        BUSINESS_CODE:
          plain:
            name: BUSINESS_CODE
          cipher:
            name: BUSINESS_CODE_CIPHER
            encryptorName: aes_encryptor
          likeQuery:
            name: BUSINESS_CODE_LIKE
            encryptorName: like_encryptor
        TELEPHONE:
          plain:
            name: TELEPHONE
          cipher:
            name: MERCHANT_TELEPHONE_CIPHER
            encryptorName: aes_encryptor
          likeQuery:
            name: MERCHANT_TELEPHONE_LIKE
            encryptorName: like_encryptor

props:
  sql-show: true


# SPEX ADDED: END
