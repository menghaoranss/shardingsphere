# SPEX ADDED: BEGIN
databaseName: sphereex_encrypt_ope

dataSources:
  sphereex_encrypt_ope:
    url: jdbc:oracle:thin:@oracle.sphereex_encrypt_ope.host:1521:XE
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: sphereex_encrypt_ope
    password: sphereex_encrypt_ope
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !SINGLE
  tables:
    - "*.*"
- !NEW_ENCRYPT
  encryptors:
    ope_encryptor:
      props:
        alpha-key: '0.8935217796678353'
        factor-e-key: '0.9186430364852792'
        factor-k-key: '523211953918290'
      type: SphereEx:FASTOPE
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
  tables:
    T_USER:
      columns:
        USER_NAME:
          dataType: VARCHAR(50)
          plain:
            name: USER_NAME_PLAIN
            queryWithPlain: ${query_with_plain}
          cipher:
            name: USER_NAME_CIPHER
            dataType: VARCHAR(100)
            encryptorName: ope_encryptor
    T_ORDER_ITEM:
      columns:
        QUANTITY:
          dataType: INT
#          TODO remove this comment and support oracle numeric ope handle
#          plain:
#            name: QUANTITY_PLAIN
#            queryWithPlain: ${query_with_plain}
          cipher:
            name: QUANTITY_CIPHER
            dataType: VARCHAR(100)
            encryptorName: aes_encryptor
          orderQuery:
            name: QUANTITY_ORDER
            dataType: VARCHAR(100)
            encryptorName: ope_encryptor
    T_PRODUCT_EXTEND:
      columns:
        PRODUCT_DESC:
          dataType: VARCHAR(50)
          plain:
            name: PRODUCT_DESC_PLAIN
            queryWithPlain: ${query_with_plain}
          cipher:
            name: PRODUCT_DESC_CIPHER
            dataType: VARCHAR(400)
            encryptorName: aes_encryptor
          orderQuery:
            name: PRODUCT_DESC_ORDER
            dataType: VARCHAR(400)
            encryptorName: ope_encryptor

props:
  sql-show: true


# SPEX ADDED: END
