databaseName: encrypt

dataSources:
  encrypt:
    url: jdbc:mysql://mysql.encrypt.host:3306/encrypt?useSSL=false&characterEncoding=utf-8
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !SINGLE
  tables:
    - "*.*"
- !ENCRYPT
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    like_encryptor:
      # SPEX CHANGED: BEGIN
      type: SphereEx:CHAR_TRANSFORM_LIKE
      props:
        transform-indexes: 1,2,3,5,7,14
      # SPEX CHANGED: END
    # SPEX ADDED: BEGIN
    char_digest_like_encryptor:
      type: CHAR_DIGEST_LIKE
        # SPEX ADDED: END
  tables:
    t_user:
      columns:
        user_name:
          # SPEX ADDED: BEGIN
          plain:
            name: user_name_plain
            queryWithPlain: ${query_with_plain}
          # SPEX ADDED: END
          cipher:
            name: user_name_cipher
            encryptorName: aes_encryptor
          likeQuery:
            name: user_name_like
            encryptorName: like_encryptor
        password:
          # SPEX ADDED: BEGIN
          plain:
            name: password_plain
            queryWithPlain: ${query_with_plain}
          # SPEX ADDED: END
