rules:
- !SHARDING
  tables:
    T_ORDER:
      actualDataNodes: ds_${0..9}.T_ORDER
      databaseStrategy:
        standard:
          shardingColumn: USER_ID
          shardingAlgorithmName: it_standard_fixture
    T_ORDER_ITEM:
      actualDataNodes: ds_${0..9}.T_ORDER_ITEM
      databaseStrategy:
        standard:
          shardingColumn: USER_ID
          shardingAlgorithmName: it_standard_fixture
      keyGenerateStrategy:
        column: ITEM_ID
        keyGeneratorName: auto_increment
      auditStrategy:
        auditorNames:
          - auditor_constant
        allowHintDisable: true
    T_ORDER_SHARDING_VIEW:
      actualDataNodes: ds_${0..9}.T_ORDER_SHARDING_VIEW
      databaseStrategy:
        standard:
          shardingColumn: USER_ID
          shardingAlgorithmName: it_standard_fixture
    T_ORDER_DETAILS:
      actualDataNodes: ds_${0..9}.T_ORDER_DETAILS
      databaseStrategy:
        standard:
          shardingColumn: USER_ID
          shardingAlgorithmName: it_standard_fixture
  bindingTables:
    - ref_0:T_ORDER,T_ORDER_ITEM,T_ORDER_SHARDING_VIEW,T_ORDER_DETAILS
  shardingAlgorithms:
    it_standard_fixture:
      type: IT.STANDARD.FIXTURE

  keyGenerators:
    auto_increment:
      type: IT.AUTO_INCREMENT.FIXTURE

  auditors:
    auditor_constant:
      type: IT.AUDITOR.FIXTURE

- !BROADCAST
  tables:
    - T_BROADCAST_TABLE
    - T_BROADCAST_TABLE_FOR_DDL
    - T_COUNTRY
    - T_PRODUCT_CATEGORY
  keyGenerateStrategies:
    t_product_category:
      keyGenerateColumn: PARENT_ID
      keyGeneratorName: auto_increment
  keyGenerators:
    auto_increment:
      type: IT.AUTO_INCREMENT.FIXTURE

props:
  sql-show: true
