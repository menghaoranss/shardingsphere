# SPEX ADDED: BEGIN
databaseName: sphereex_encrypt_failover

dataSources:
  sphereex_encrypt_failover:
    url: jdbc:opengauss://opengauss.sphereex_encrypt_failover.host:5432/sphereex_encrypt_failover?batchMode=OFF
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !ENCRYPT
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    like_encryptor:
      type: SphereEx:CHAR_TRANSFORM_LIKE
      props:
        transform-indexes: 1,2,3,5,7,14
  encryptMode:
    type: FRONTEND
    props:
      use-original-sql-when-cipher-query-failed: true
  tables:
    t_merchant:
      columns:
        business_code:
          plainColumn: business_code
          cipherColumn: business_code_cipher
          encryptorName: aes_encryptor
          likeQueryColumn: business_code_like
          likeQueryEncryptorName: like_encryptor
        telephone:
          plainColumn: telephone
          cipherColumn: merchant_telephone_cipher
          encryptorName: aes_encryptor
          likeQueryColumn: merchant_telephone_like
          likeQueryEncryptorName: like_encryptor
      

# SPEX ADDED: END
