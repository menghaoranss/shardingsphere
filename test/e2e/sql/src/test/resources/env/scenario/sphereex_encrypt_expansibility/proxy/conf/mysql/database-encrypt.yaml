schemaName: sphereex_encrypt_expansibility

dataSources:
  encrypt:
    url: jdbc:mysql://mysql.sphereex_encrypt_expansibility.host:3306/encrypt?useSSL=false&characterEncoding=utf-8
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !ENCRYPT
  encryptors:
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
    des_encryptor:
      type: SphereEx:DES
      props:
        des-key-value: 123456abc
        digest-algorithm-name: SHA-1
    desede_encryptor:
      type: SphereEx:DESEDE
      props:
        desede-key-value: 123456abc
        digest-algorithm-name: SHA-1
    rsa_encryptor:
      type: SphereEx:RSA
      props:
        rsa-public-key-value: 
        rsa-private-key-value: 
    rc4_encryptor:
      type: RC4
      props:
        rc4-key-value: test-sharding
    sm2_encryptor:
      type: SphereEx:SM2
      props:
        sm2-public-key-value: MFkwEwYHKoZIzj0CAQYIKoEcz1UBgi0DQgAE0oppHTfuiESO0DR+9c5g7iRlrbDHgPVeRQzNsskL4ZSHkYvyms76Zv4He95WySnTuZMo0OaQchhRbmXIkXRuyA==
        sm2-private-key-value: MIGTAgEAMBMGByqGSM49AgEGCCqBHM9VAYItBHkwdwIBAQQg7ltTxwCxo5gUftPXTLCfDCKCvl7284CRkc/bk4YyzJagCgYIKoEcz1UBgi2hRANCAATSimkdN+6IRI7QNH71zmDuJGWtsMeA9V5FDM2yyQvhlIeRi/Kazvpm/gd73lbJKdO5kyjQ5pByGFFuZciRdG7I
    sm4_encryptor:
      type: SM4
      props:
        sm4-mode: ECB
        sm4-padding: PKCS5Padding
        sm4-key: 4D744E003D713D054E7E407C350E447E
    char_transform_like_encryptor:
      type: SphereEx:CHAR_TRANSFORM_LIKE
    char_digest_like_encryptor:
      type: CHAR_DIGEST_LIKE
    md5_assisted_encryptor:
      type: MD5
    sha_assisted_encryptor:
      type: SphereEx:SHA
    ope_encryptor:
      props:
        alpha-key: '0.8935217796678353'
        factor-e-key: '0.9186430364852792'
        factor-k-key: '523211953918290'
      type: SphereEx:FASTOPE
  tables:
    t_user:
      columns:
        user_name:
          plainColumn: user_name_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: user_name_cipher
          encryptorName: aes_encryptor
          likeQueryColumn: user_name_like
          likeQueryEncryptorName: char_transform_like_encryptor
          assistedQueryColumn: user_name_assisted_query
          assistedQueryEncryptorName: sha_assisted_encryptor
        password:
          plainColumn: password_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: password_cipher
          encryptorName: des_encryptor
          likeQueryColumn: password_like
          likeQueryEncryptorName: char_digest_like_encryptor
          assistedQueryColumn: password_assisted_query
          assistedQueryEncryptorName: md5_assisted_encryptor
        email:
          plainColumn: email_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: email_cipher
          encryptorName: desede_encryptor
        address:
          plainColumn: address_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: address_cipher
          encryptorName: rsa_encryptor
        city:
          plainColumn: city_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: city_cipher
          encryptorName: rc4_encryptor
        country:
          plainColumn: country_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: country_cipher
          encryptorName: rc4_encryptor
        province:
          plainColumn: province_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: province_cipher
          encryptorName: sm4_encryptor
    t_user_details:
      columns:
        number:
          plainColumn: number_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: number_cipher
          encryptorName: aes_encryptor
        number_new:
          plainColumn: number_new_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: number_new_cipher
          encryptorName: aes_encryptor
