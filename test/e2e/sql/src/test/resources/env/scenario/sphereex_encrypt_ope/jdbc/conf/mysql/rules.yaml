# SPEX ADDED: BEGIN
schemaName: sphereex_encrypt_ope

dataSources:
  sphereex_encrypt_ope:
    url: jdbc:mysql://mysql.sphereex_encrypt_ope.host:3306/sphereex_encrypt_ope?serverTimezone=UTC&useSSL=false&characterEncoding=utf-8
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: test_user
    password: Test@123
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !ENCRYPT
  encryptors:
    ope_encryptor:
      props:
        alpha-key: '0.8935217796678353'
        factor-e-key: '0.9186430364852792'
        factor-k-key: '523211953918290'
      type: SphereEx:FASTOPE
    aes_encryptor:
      type: AES
      props:
        aes-key-value: 123456abc
        digest-algorithm-name: SHA-1
  tables:
    t_user:
      columns:
        user_name:
          dataType: VARCHAR(50)
          plainColumn: user_name_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: user_name_cipher
          cipherDataType: VARCHAR(100)
          encryptorName: ope_encryptor
    t_order_item:
      columns:
        quantity:
          dataType: INTEGER
          plainColumn: quantity_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: quantity_cipher
          cipherDataType: VARCHAR(100)
          encryptorName: aes_encryptor
          orderQueryColumn: quantity_order
          orderQueryDataType: VARCHAR(100)
          orderQueryEncryptorName: ope_encryptor
    t_product:
      columns:
        price:
          dataType: DECIMAL(10, 0)
          plainColumn: price_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: price_cipher
          cipherDataType: VARCHAR(400)
          encryptorName: ope_encryptor
    t_product_extend:
      columns:
        product_desc:
          dataType: VARCHAR(50)
          plainColumn: product_desc_plain
          queryWithCipherColumn: ${query_with_cipher}
          cipherColumn: product_desc_cipher
          cipherDataType: VARCHAR(400)
          encryptorName: aes_encryptor
          orderQueryColumn: product_desc_order
          orderQueryDataType: VARCHAR(400)
          orderQueryEncryptorName: ope_encryptor

props:
  sql-show: true

# SPEX ADDED: END
