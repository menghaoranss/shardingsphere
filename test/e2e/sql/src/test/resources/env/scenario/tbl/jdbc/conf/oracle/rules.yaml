# SPEX ADDED: BEGIN
schemaName: tbl

dataSources:
  tbl:
    url: jdbc:oracle:thin:@oracle.tbl.host:1521:XE
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    username: tbl
    password: tbl
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 60000
    maxLifetimeMilliseconds: 1800000
    maxPoolSize: 2
    minPoolSize: 2

rules:
- !SHARDING
  tables:
    T_ORDER:
      actualDataNodes: tbl.T_ORDER_${0..9}
      tableStrategy:
        standard:
          shardingColumn: ORDER_ID
          shardingAlgorithmName: it_standard_fixture
    T_ORDER_ITEM:
      actualDataNodes: tbl.T_ORDER_ITEM_${0..9}
      tableStrategy:
        standard:
          shardingColumn: ORDER_ID
          shardingAlgorithmName: it_standard_fixture
      keyGenerateStrategy:
        column: ITEM_ID
        keyGeneratorName: auto_increment
      auditStrategy:
        auditorNames:
          - auditor_constant
        allowHintDisable: true
    T_ORDER_SHARDING_VIEW:
      actualDataNodes: tbl.T_ORDER_SHARDING_VIEW_${0..9}
      tableStrategy:
        standard:
          shardingColumn: ORDER_ID
          shardingAlgorithmName: it_standard_fixture
    T_ORDER_DETAILS:
      actualDataNodes: tbl.T_ORDER_DETAILS_${0..9}
      tableStrategy:
        standard:
          shardingColumn: ORDER_ID
          shardingAlgorithmName: it_standard_fixture
    T_PRODUCT:
      actualDataNodes: tbl.T_PRODUCT_${0..9}
      tableStrategy:
        hint:
          shardingAlgorithmName: t_product_hint_inline
  bindingTables:
    - ref_0:T_ORDER,T_ORDER_ITEM,T_ORDER_SHARDING_VIEW,T_ORDER_DETAILS

  shardingAlgorithms:
    it_standard_fixture:
      type: IT.STANDARD.FIXTURE
    t_product_hint_inline:
      type: HINT_INLINE
      props:
        algorithm-expression: T_PRODUCT_${value}

  keyGenerators:
    auto_increment:
      type: IT.AUTO_INCREMENT.FIXTURE

  auditors:
    auditor_constant:
      type: IT.AUDITOR.FIXTURE

- !BROADCAST
  tables:
    - T_BROADCAST_TABLE
    - T_BROADCAST_TABLE_FOR_DDL

props:
  sql-show: true
# SPEX ADDED: END
